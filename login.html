<!DOCTYPE html>
<html>
<head>
<title>HepTech Admin Login</title>

<style>
body{
font-family:Arial;
background:#f4f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="login-box">

<h2>HepTech Admin</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let email = document.getElementById("email").value
let password = document.getElementById("password").value

if(email === "admin@heptech.ca" && password === "heptech123"){

window.location = "index.html"

}
else{

alert("Wrong login")

}

}

</script>

</body>
</html>
